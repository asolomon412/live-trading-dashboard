<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyTradingView</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <!-- Lightweight Charts v4 -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <!-- ── Top bar ── -->
  <header class="topbar">
    <span class="logo">⬛ MyTradingView</span>

    <div class="topbar-controls">
      <label for="chart-count-select">Charts</label>
      <select id="chart-count-select">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="6">6</option>
        <option value="8">8</option>
      </select>
    </div>

    <div class="conn-indicator" id="conn-indicator" title="WebSocket status">
      <span class="conn-dot"></span>
      <span class="conn-label">Connecting…</span>
    </div>
  </header>

  <!-- ── Chart grid ── -->
  <main id="chart-grid" class="chart-grid grid-4"></main>

  <!-- ── Pane template (cloned by JS) ── -->
  <template id="pane-template">
    <div class="chart-pane" data-pane-id="">
      <div class="pane-toolbar">
        <div class="ticker-bar">
          <span class="ticker-symbol">—</span>
          <span class="ticker-price">—</span>
          <span class="ticker-change">—</span>
        </div>
        <div class="pane-controls">
          <select class="source-select">
            <option value="hyperliquid">Hyperliquid</option>
            <option value="yfinance">yFinance</option>
            <option value="alpaca" selected>Alpaca</option>
          </select>
          <input class="symbol-input" type="text" value="AAPL" spellcheck="false" />
          <select class="tf-select">
            <option value="1m">1m</option>
            <option value="2m">2m</option>
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="30m">30m</option>
            <option value="1h" selected>1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
            <option value="1w">1w</option>
          </select>
          <button class="btn-load" title="Load chart">↻</button>
          <div class="indicator-wrap">
            <button class="btn-indicators" title="Indicators">
              Ind <span class="ind-badge" style="display:none"></span>
            </button>
            <div class="indicator-panel" hidden></div>
          </div>
        </div>
      </div>
      <div class="chart-body">
        <nav class="drawing-toolbar">
          <button class="btn-draw active" data-tool="cursor"    title="Cursor — click a drawing to delete it">↖</button>
          <button class="btn-draw"        data-tool="trendline" title="Trend Line — click two points">╱</button>
          <button class="btn-draw"        data-tool="fibonacci" title="Fibonacci Retracement — click high then low">φ</button>
          <button class="btn-draw"        data-tool="priceline" title="Price Line — click to place">─</button>
          <span class="draw-sep"></span>
          <button class="btn-draw btn-draw-clear" title="Clear all drawings">✕</button>
        </nav>
        <div class="chart-container"></div>
      </div>
    </div>
  </template>

  <script src="/static/js/indicators.js"></script>
  <script src="/static/js/drawing.js"></script>
  <script src="/static/js/charts.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
